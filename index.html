<style>

/* =========================
   BACKGROUND
========================= */

body{
    margin:0;
    min-height:100vh;
    overflow-x:hidden;
    font-family: 'Nunito', sans-serif;

    background-image:url('https://i.pinimg.com/webp/1200x/b7/6d/5f/b76d5f2ffb21263b588c23618d97ee9a.webp');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    position:relative;
}

.bg-overlay{
    position:fixed;
    inset:0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.15);
    z-index:0;
}

/* =========================
   MAIN UI
========================= */

.main-ui{
    width:100%;
    max-width:1450px;
    margin:auto;
    padding:20px;
    position:relative;
    z-index:2;

    display:grid;
    grid-template-columns: 1.25fr 0.38fr 0.65fr;
    grid-template-rows:auto auto auto;
    gap:20px;
}

/* =========================
   TITLE
========================= */

.title-wrap{
    grid-column:1/3;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.title-img{
    width:700px;
    max-width:100%;
}

/* =========================
   CARD
========================= */

.cute-card{
    background:#f7f7f7;
    border-radius:22px;
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* =========================
   SUHU
========================= */

.suhu-card{
    height:275px;
    padding:28px 40px;
}

.mini-title{
    font-size:20px;
    color:#b48acb;
    font-weight:900;
}

.suhu-value{
    margin-top:50px;
    font-size:90px;
    color:#ff2f2f;
    font-weight:900;
    letter-spacing:10px;
}

.suhu-desc{
    margin-top:10px;
    color:#b7b7b7;
    font-weight:700;
    font-size:28px;
}

/* =========================
   FIREBASE
========================= */

.firebase-card{
    grid-column:1/2;
    height:585px;
    padding:30px 50px;
}

.firebase-title{
    font-size:42px;
    font-weight:900;
    color:#d4288d;
    margin-bottom:35px;
}

.firebase-card label{
    display:block;
    margin-top:25px;
    margin-bottom:10px;

    color:#c11f7d;
    font-size:30px;
    font-weight:900;
}

.firebase-card input{
    width:100%;
    height:60px;
    border-radius:20px;
    border:5px solid #ff4aa9;
    background:white;

    font-size:20px;
    padding:0 20px;
}

.firebase-btn{
    margin-top:40px;
    width:520px;
    max-width:100%;
    height:72px;

    border:none;
    border-radius:40px;

    background:#ff43a5;
    color:white;

    font-size:28px;
    font-weight:900;
    cursor:pointer;
}

/* =========================
   MODE
========================= */

.mode-card{
    height:585px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.mode-title{
    font-size:52px;
    font-weight:900;
    color:#ff72bb;
}

.mode-bottom{
    font-size:42px;
    font-weight:900;
    color:#e7d84e;
    margin-top:20px;
}

/* =========================
   SWITCH
========================= */

.switch{
    position:relative;
    display:inline-block;
    width:100px;
    height:180px;
    margin-top:20px;
}

.switch input{
    opacity:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#f1eba2;
    border-radius:60px;
}

.slider:before{
    content:"";
    position:absolute;
    width:72px;
    height:72px;
    border-radius:50%;
    background:#f7b9d5;
    left:14px;
    top:14px;
    transition:0.4s;
}

.switch input:checked + .slider:before{
    transform:translateY(80px);
}

/* =========================
   RELAY
========================= */

.relay-card{
    height:585px;
    padding:30px;
    text-align:center;
}

.relay-light{
    width:120px;
    margin-top:10px;
}

.relay-title{
    margin-top:20px;
    font-size:56px;
    font-weight:900;
    color:#e46d3f;
}

.relay-desc{
    margin-top:20px;
    color:#9f9f9f;
    font-size:26px;
    line-height:1.5;
    font-weight:700;
}

.relay-status{
    margin-top:30px;
    font-size:58px;
    color:#999;
    font-weight:900;
}

/* =========================
   TERMINAL
========================= */

.terminal-card{
    grid-column:2/4;

    background:#6b0f49;
    border-radius:35px;

    height:380px;
    overflow:hidden;
    position:relative;
}

.terminal-header{
    height:62px;
    display:flex;
    align-items:center;
    padding:0 25px;
    gap:20px;
}

.dots{
    display:flex;
    gap:12px;
}

.dot{
    width:18px;
    height:18px;
    border-radius:50%;
}

.red{background:#ff5f57;}
.yellow{background:#febc2e;}
.green{background:#28c840;}

.terminal-title{
    color:#ff59c2;
    font-size:22px;
}

.terminal-log{
    width:calc(100% - 50px);
    height:280px;
    background:black;
    margin:auto;
    border-radius:10px;
    overflow:auto;
    padding:20px;
    color:#7dff8a;
    font-family:monospace;
}

/* =========================
   CHARTS
========================= */

.chart-left{
    position:absolute;
    left:-40px;
    bottom:10px;
    width:180px;
}

.chart-bottom{
    position:absolute;
    right:20px;
    bottom:10px;
    width:180px;
}

.chart-suhu{
    position:absolute;
    right:30px;
    top:80px;
    width:160px;
}

.chart-auto{
    position:absolute;
    bottom:40px;
    width:110px;
}

.relay-light{
    width:100px;
}

/* =========================
   HIASAN
========================= */

.deco{
    position:fixed;
    z-index:1;
    pointer-events:none;
}

.deco-left{
    left:-20px;
    bottom:0;
    width:230px;
}

.deco-right{
    right:-10px;
    top:160px;
    width:180px;
}

.vector{
    position:fixed;
    z-index:1;
}

.vector-1{
    top:70px;
    left:210px;
    width:60px;
}

.vector-2{
    top:100px;
    right:520px;
    width:80px;
}

.star{
    position:fixed;
    top:40px;
    right:550px;
    width:70px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1200px){

    .main-ui{
        grid-template-columns:1fr;
    }

    .title-wrap,
    .firebase-card,
    .terminal-card{
        grid-column:auto;
    }

    .firebase-card,
    .relay-card,
    .mode-card,
    .suhu-card{
        height:auto;
    }

}

</style>
