<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Little Pusheen Smart Garden 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --pink-main: #ff65a3;
            --pink-light: #ffbcca;
            --pink-border: #fca5c6;
            --text-dark: #7a5264;
            --card-bg: rgba(255, 255, 255, 0.95);
            --radius: 24px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            background: url('https://i.pinimg.com/webp/1200x/b7/6d/5f/b76d5f2ffb21263b588c23618d97ee9a.webp') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-dark);
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* ===== CONTAINER UTAMA LAYOUT MACAM FIGMA ===== */
        .ui-container {
            width: 1000px;
            height: 700px;
            position: relative;
            z-index: 1;
        }

        /* ===== DEKORASI ASSET GAMBAR JUDUL & HIASAN ===== */
        .main-title {
            position: absolute;
            top: 25px;
            left: 260px;
            width: 420px;
            z-index: 5;
        }

        .decor-twilight {
            position: absolute;
            top: -20px;
            left: 5px;
            width: 240px;
            z-index: 4;
        }

        .decor-star {
            position: absolute;
            top: 50px;
            left: 690px;
            width: 45px;
            z-index: 4;
        }

        .decor-orange {
            position: absolute;
            top: 195px;
            right: -10px;
            width: 100px;
            z-index: 4;
        }

        .decor-unicorn {
            position: absolute;
            bottom: -5px;
            left: -10px;
            width: 145px;
            z-index: 4;
        }

        .decor-fluttershy {
            position: absolute;
            bottom: -15px;
            left: 430px;
            width: 140px;
            z-index: 4;
        }

        /* ===== BADGES STATUS JARINGAN ===== */
        .status-container {
            position: absolute;
            top: -15px;
            right: 0;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .badge {
            background: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            border: 2px solid var(--pink-light);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge.online { 
            color: white; 
            background: var(--pink-main); 
            border-color: var(--pink-main); 
        }

        /* ===== BASE STYLING KOTAK KARTU ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 8px 20px rgba(220, 150, 170, 0.2);
            padding: 25px;
            position: absolute;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--pink-main);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: capitalize;
        }

        /* ===== KOTAK KIRI: FIREBASE CLOUD SYNC ===== */
        .firebase-card {
            width: 510px;
            height: 400px;
            left: 0;
            bottom: 45px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            color: var(--pink-main);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 3px solid var(--pink-light);
            border-radius: 16px;
            font-size: 14px;
            color: var(--text-dark);
            background: white;
            outline: none;
            margin-bottom: 18px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
        }
        input[type=password] { font-family: 'Space Mono', monospace; }
        input:focus { border-color: var(--pink-main); }

        .btn-connect {
            background: var(--pink-main);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .btn-connect:active { transform: scale(0.98); }

        /* Wadah Kontrol Micro:bit Bluetooth BLE */
        .ble-control-box {
            display: flex;
            gap: 8px;
        }
        .btn-ble {
            background: #a3b8cc;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
        }
        .btn-ble:disabled { background: #e2e8f0; cursor: not-allowed; color: #94a3b8; }

        /* ===== KOTAK KANAN ATAS: DHT11 SENSOR SUHU ===== */
        .dht-card {
            width: 270px;
            height: 200px;
            right: 200px;
            top: 105px;
            padding: 20px;
        }
        .dht-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--pink-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dht-header img { width: 14px; height: 14px; }
        .dht-value {
            font-size: 56px;
            font-weight: 700;
            color: var(--pink-main);
            text-align: center;
            margin-top: 15px;
            position: relative;
            display: block;
            letter-spacing: -2px;
        }
        .dht-unit {
            font-size: 20px;
            position: absolute;
            top: 5px;
            color: var(--pink-main);
            margin-left: 5px;
        }
        .dht-desc {
            font-size: 11px;
            color: #bfa3b0;
            text-align: center;
            margin-top: 5px;
            font-weight: 600;
        }

        /* ===== KOTAK TENGAH: VERTICAL MODE SWITCH TOGGLE ===== */
        .toggle-card {
            width: 150px;
            height: 180px;
            right: 490px;
            bottom: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 10px;
        }
        .toggle-label-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--pink-main);
        }
        .switch-btn-vertical {
            background: #ffe699;
            border: none;
            width: 44px;
            height: 84px;
            border-radius: 22px;
            position: relative;
            cursor: pointer;
            padding: 4px;
        }
        .switch-btn-vertical .ball {
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        /* Kondisi visual saat mode manual aktif (pindah ke bawah) */
        .switch-btn-vertical.manual-active { background: #ffccd5; }
        .switch-btn-vertical.manual-active .ball { top: 44px; }

        /* ===== KOTAK KANAN TENGAH: RELAY CONTROLLER ===== */
        .relay-card {
            width: 270px;
            height: 180px;
            right: 200px;
            bottom: 245px;
            text-align: center;
            padding: 15px;
        }
        .relay-icon {
            font-size: 32px;
            color: #ffcc00;
            margin-bottom: 2px;
        }
        .relay-card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--pink-main);
            margin-bottom: 2px;
        }
        .relay-subtitle {
            font-size: 10px;
            color: #bfa3b0;
            line-height: 1.3;
            margin-bottom: 10px;
            padding: 0 5px;
        }
        .relay-status-label {
            font-size: 24px;
            font-weight: 700;
            color: #bfa3b0;
            text-transform: capitalize;
        }
        .relay-status-label.on-state { color: var(--pink-main); }

        /* Saklar Horizontal Pendukung Mode Manual */
        .manual-relay-switch-container {
            display: none;
            justify-content: center;
            margin-top: 5px;
        }
        .horizontal-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 22px;
        }
        .horizontal-switch input { opacity: 0; width: 0; height: 0; }
        .horiz-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 20px;
        }
        .horiz-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .horiz-slider { background-color: var(--pink-main); }
        input:checked + .horiz-slider:before { transform: translateX(24px); }


        /* ===== KOTAK KANAN BAWAH: SYSTEM TERMINAL LOGS ===== */
        .terminal-box {
            width: 460px;
            height: 240px;
            right: 15px;
            bottom: 15px;
            background: #2e081c;
            border-radius: var(--radius);
            padding: 15px;
            border: 4px solid #4a1230;
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .terminal-dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }
        .terminal-title {
            color: #ffbcca;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            margin-left: 8px;
        }
        .terminal-logs {
            height: 165px;
            overflow-y: auto;
            font-family: 'Space Mono', monospace;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            padding: 10px;
            font-size: 10px;
            color: #ffbcca;
            list-style: none;
            text-align: left;
        }
        .terminal-logs::-webkit-scrollbar { width: 4px; }
        .terminal-logs::-webkit-scrollbar-thumb { background: var(--pink-main); border-radius: 4px; }
        .log-row { margin-bottom: 2px; }
        .log-timestamp { color: var(--pink-light); margin-right: 5px; opacity: 0.8; }
        .btn-clear-terminal {
            background: transparent;
            border: 1.5px solid var(--pink-light);
            color: var(--pink-light);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
        }
        .btn-clear-terminal:hover { background: var(--pink-main); color: white; border-color: var(--pink-main); }

        /* AREA GRAFIK DISEMBUNYIKAN AGAR TIDAK MERUSAK KELURUSAN UI MOCKUP */
        .hidden-graph-elements { display: none !important; }

        /* Responsivitas Skala Layar */
        @media (max-width: 1024px) {
            body { overflow: auto; padding: 20px; }
            .ui-container { transform: scale(0.85); transform-origin: center top; margin-top: -30px; }
        }
    </style>
</head>
<body>

<div class="status-container">
    <div class="badge" id="status-bt"><i class="fab fa-bluetooth-b"></i> BT Offline</div>
    <div class="badge" id="status-fb"><i class="fas fa-cloud"></i> DB Offline</div>
</div>

<div class="ui-container">

    <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2013.png?raw=true" class="main-title" alt="Title">
    <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%204.png?raw=true" class="decor-twilight" alt="Twilight">
    <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Star%202.png?raw=true" class="decor-star" alt="Star">
    <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%205.png?raw=true" class="decor-orange" alt="Orange">
    <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Vector%206.png?raw=true" class="decor-unicorn" alt="Unicorn">
    <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Vector%203.png?raw=true" class="decor-fluttershy" alt="Fluttershy">

    <div class="card firebase-card">
        <div class="card-title">
            <i class="fas fa-cloud"></i> Fire base cloud sync
        </div>
        
        <label>Api key</label>
        <input type="password" id="fb-apiKey" placeholder="Masukkan Firebase API Key...">
        
        <label>Database URL</label>
        <input type="text" id="fb-dbUrl" placeholder="https://database-url-default.firebaseio.com">
        
        <label>Node path</label>
        <input type="text" id="fb-path" value="smarthome/ruangan1">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
            <button class="btn-connect" id="btn-connect-fb">
                <i class="fas fa-link"></i> Hubungkan Firebase
            </button>
            
            <div class="ble-control-box">
                <button class="btn-ble" id="btn-connect-ble">Connect Microbit</button>
                <button class="btn-ble" id="btn-disconnect-ble" disabled>Disconnect</button>
            </div>
        </div>
    </div>

    <div class="card dht-card">
        <div class="dht-header">
            <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f321.png" alt="thermometer">
            <span>DHT11 - SUHU</span>
        </div>
        <div class="dht-value" id="val-suhu">
            --<span class="dht-unit">°</span>
        </div>
        <div class="dht-desc">Suhu udara taman</div>
        
        <div id="val-jarak" style="display:none;">--</div>
        <div id="bar-jarak" style="display:none;"></div>
        <div id="val-jarak-manual" style="display:none;">--</div>
        <div id="bar-jarak-manual" style="display:none;"></div>
        <div id="alertEmber" style="display:none;"></div>
    </div>

    <div class="card toggle-card">
        <div class="toggle-label-text" id="modePillText">Auto</div>
        <button class="switch-btn-vertical" id="btnToggleMode" title="Ubah Mode Kontrol">
            <div class="ball"></div>
        </button>
        <div id="modePill" class="mode-pill auto" style="display:none;"></div>
    </div>

    <div class="card relay-card">
        <div class="relay-icon" id="icon-relay">⚡</div>
        <div class="relay-card-title">Relay</div>
        <div class="relay-subtitle">📌 pin P13 . Untuk mengontrol nyala dan matinya kipas</div>
        <div class="relay-status-label" id="lbl-relay">Off</div>
        
        <div class="manual-relay-switch-container" id="manual-relay">
            <label class="horizontal-switch">
                <input type="checkbox" id="sw-relay" onchange="window.toggleRelay(this.checked)">
                <span class="horiz-slider"></span>
            </label>
        </div>
    </div>

    <div class="terminal-box">
        <div class="terminal-header">
            <div class="terminal-dots">
                <div class="dot r"></div>
                <div class="dot y"></div>
                <div class="dot g"></div>
                <span class="terminal-title">System_terminal</span>
            </div>
            <button class="btn-clear-terminal" id="btnClearLog">Clear</button>
        </div>
        <div id="terminalLog" class="terminal-logs"></div>
    </div>

</div>

<div class="hidden-graph-elements">
    <canvas id="chart-jarak"></canvas>
    <canvas id="chart-jarak-manual"></canvas>
    <canvas id="chart-jarak-big"></canvas>
    <canvas id="chart-jarak-manual-big"></canvas>
</div>

<script type="module">
import { initializeApp, getApps, deleteApp }     from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, onValue, update, set } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

// =====================================================================
// CORE ENGINE LOGIC STORAGE
// =====================================================================
const state = {
    db: null, path: "", unsub: null, data: {},
    device: null, txChar: null, rxChar: null,
    bleConnected: false, bleBuffer: "",
    modeOtomatis: 1,   
    charts: {},
    history: {
        jarak:        { labels: [], data: [] },
        jarak_manual: { labels: [], data: [] }
    }
};

const MAX_PTS = 30;
const $ = id => document.getElementById(id);

// =====================================================================
// TERMINAL LOG CONTROLLER
// =====================================================================
function log(msg, color = "#ffbcca") {
    const t = new Date().toLocaleTimeString('id-ID', { hour12: false });
    $('terminalLog').insertAdjacentHTML('afterbegin',
        `<div class="log-row"><span class="log-timestamp">[${t}]</span><span style="color:${color}"> ${msg}</span></div>`);
}

// =====================================================================
// HARDWARE CONNECTION STATUS BADGES
// =====================================================================
function updateBTStatus() {
    $('btn-connect-ble').disabled    = state.bleConnected;
    $('btn-disconnect-ble').disabled = !state.bleConnected;
    const b = $('status-bt');
    b.innerHTML = state.bleConnected
        ? '<i class="fab fa-bluetooth-b"></i> BT Connected'
        : '<i class="fab fa-bluetooth-b"></i> BT Offline';
    b.className = 'badge' + (state.bleConnected ? ' online' : '');
}
function updateDBStatus(ok) {
    const b = $('status-fb');
    b.innerHTML = ok
        ? '<i class="fas fa-cloud"></i> DB Synced'
        : '<i class="fas fa-cloud"></i> DB Offline';
    b.className = 'badge' + (ok ? ' online' : '');
}

// =====================================================================
// SYSTEM OPERATION MODE SWITCHER (Auto / Manual Toggle Logic)
// =====================================================================
function applyMode(isAuto) {
    state.modeOtomatis = isAuto ? 1 : 0;
    const pillText = $('modePillText');
    const switchBtn = $('btnToggleMode');

    if (isAuto) {
        pillText.textContent = "Auto";
        switchBtn.classList.remove('manual-active');
        $('manual-relay').style.display = 'none';
    } else {
        pillText.textContent = "Manual";
        switchBtn.classList.add('manual-active');
        $('manual-relay').style.display = 'inline-flex';
    }

    sendBLE("mode", isAuto ? 1 : 0);
    if (state.db) update(ref(state.db, `${state.path}/mode`), { value: isAuto ? 1 : 0 });
    log(`Mode Transisi → ${isAuto ? 'AUTOMATIC' : 'MANUAL'}`, isAuto ? '#ffbcca' : '#ffe391');
}

$('btnToggleMode').onclick = () => applyMode(state.modeOtomatis === 0);

// =====================================================================
// RELAY OUTPUT VIEW UPDATER
// =====================================================================
function updateRelayUI(isOn) {
    const lbl = $('lbl-relay');
    const sw   = $('sw-relay');
    
    if (isOn) {
        lbl.textContent = 'On';
        lbl.classList.add('on-state');
    } else {
        lbl.textContent = 'Off';
        lbl.classList.remove('on-state');
    }
    if (sw && document.activeElement !== sw) sw.checked = isOn;
}

// =====================================================================
// SENSOR VALUE DATA MAP VISUALIZATION
// =====================================================================
function updateSensorUI(key, val) {
    if (key === 'jarak') {
        const el = $('val-suhu');
        if (el) {
            el.innerHTML = `${val}<span class="dht-unit">°</span>`;
        }
    }
}

// =====================================================================
// MICROBIT UART BLUETOOTH BLE DRIVER ENGINE
// =====================================================================
const SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const TX  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const RX  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

async function connectBLE() {
    try {
        if (!navigator.bluetooth) throw new Error("Browser tidak mensuport Bluetooth API.");
        log("Mencari perangkat Micro:bit...", "#ffe391");
        state.device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: [SVC]
        });
        state.device.addEventListener("gattserverdisconnected", () => {
            state.bleConnected = false; updateBTStatus();
            log("Koneksi BLE Terputus!", "#ff5f56");
        });
        const server  = await state.device.gatt.connect();
        const service = await server.getPrimaryService(SVC);
        state.txChar  = await service.getCharacteristic(TX);
        state.rxChar  = await service.getCharacteristic(RX);
        await state.txChar.startNotifications();
        state.txChar.addEventListener("characteristicvaluechanged", onBLEData);
        state.bleConnected = true; updateBTStatus();
        log(`✓ Terhubung via BLE: ${state.device.name}`, "#27c93f");
    } catch (e) { log(`BLE Error: ${e.message}`, "#ff5f56"); }
}

function onBLEData(event) {
    let arr = [];
    for (let i = 0; i < event.target.value.byteLength; i++)
        arr.push(event.target.value.getUint8(i));
    state.bleBuffer += String.fromCharCode.apply(null, arr);
    const lines = state.bleBuffer.split('\n');
    state.bleBuffer = lines.pop() || "";
    lines.forEach(line => { const t = line.trim(); if (t) processBLELine(t); });
}

function processBLELine(txt) {
    log(`RX ← ${txt}`, "#27c93f");
    if (!txt.includes(',')) return;

    const idx = txt.indexOf(',');
    const key = txt.substring(0, idx).trim();
    const val = parseFloat(txt.substring(idx + 1).trim());
    if (isNaN(val)) return;

    if (key === "mode") {
        applyMode(val === 1);
        return;
    }
    if (key === "Relay") {
        updateRelayUI(val === 1);
        if (state.db) update(ref(state.db, `${state.path}/relay`), { value: val, tipe: 'switch' });
        return;
    }
    if (key === "jarak") {
        updateSensorUI("jarak", val);
        pushHistory("jarak", val);
        if (state.db) update(ref(state.db, `${state.path}/jarak`), { value: val, tipe: 'sensor', satuan: 'cm' });
        return;
    }
    if (key === "jarak_manual") {
        updateSensorUI("jarak_manual", val);
        pushHistory("jarak_manual", val);
        if (state.db) update(ref(state.db, `${state.path}/jarak_manual`), { value: val, tipe: 'sensor', satuan: 'cm' });
        return;
    }
}

async function sendBLE(key, val) {
    if (!state.rxChar) return;
    const payload = `${key},${val}\n`;
    try {
        await state.rxChar.writeValue(new TextEncoder().encode(payload));
        log(`TX → ${payload.trim()}`, "#ffe391");
    } catch (e) { log(`TX Error: ${e.message}`, "#ff5f56"); }
}

window.toggleRelay = (isChecked) => {
    if (state.modeOtomatis === 1) return;
    const val = isChecked ? 1 : 0;
    updateRelayUI(isChecked);
    sendBLE("Relay", val);
    if (state.db) update(ref(state.db, `${state.path}/relay`), { value: val });
    log(`Kipas Relay → ${isChecked ? 'ON' : 'OFF'}`, "#ffe391");
};

// =====================================================================
// GOOGLE FIREBASE REALTIME CONNECTION MAP
// =====================================================================
async function connectFirebase() {
    const apiKey = $('fb-apiKey').value.trim();
    const dbUrl  = $('fb-dbUrl').value.trim();
    const path   = $('fb-path').value.trim() || "smarthome/ruangan1";
    if (!apiKey || !dbUrl) { alert("Lengkapi Isian API Key dan Database URL!"); return; }

    try {
        const apps = getApps();
        if (apps.length > 0) await deleteApp(apps[0]);
        if (state.unsub) state.unsub();

        const app = initializeApp({
            apiKey, databaseURL: dbUrl,
            projectId: dbUrl.replace("https://","").split(".")[0]
        });
        state.db   = getDatabase(app);
        state.path = path;
        log(`Menyambungkan Realtime DB → /${path}`, "#ffe391");

        const initData = {
            jarak:        { tipe: 'sensor', value: 0, satuan: 'cm' },
            jarak_manual: { tipe: 'sensor', value: 0, satuan: 'cm' },
            relay:        { tipe: 'switch', value: 0 },
            mode:         { tipe: 'switch', value: 1 }
        };

        state.unsub = onValue(ref(state.db, path), (snap) => {
            const d = snap.val();
            if (!d) { set(ref(state.db, path), initData); return; }
            state.data = d;
            updateDBStatus(true);

            if (d.jarak)        updateSensorUI("jarak",        d.jarak.value ?? 0);
            if (d.jarak_manual) updateSensorUI("jarak_manual", d.jarak_manual.value ?? 0);
            if (d.relay)        updateRelayUI((d.relay.value ?? 0) === 1);
            if (d.mode)         applyMode((d.mode.value ?? 1) === 1);
        }, err => { log(`DB Error: ${err.message}`, "#ff5f56"); updateDBStatus(false); });

        log(`✓ Firebase Berhasil Tersinkronisasi: /${path}`, "#27c93f");
        localStorage.setItem('smarthome_cfg', JSON.stringify({ apiKey, dbUrl, path }));
    } catch (e) { log(`DB Error: ${e.message}`, "#ff5f56"); updateDBStatus(false); }
}

// =====================================================================
// CHART REPLAY ENGINE BACKGROUND LOOP
// =====================================================================
const CHART_CFG = {
    jarak:        { color: '#ff65a3', label: 'Jarak' },
    jarak_manual: { color: '#ffbcca', label: 'Jarak Manual' }
};

function makeChart(canvasId, key, height = 90) {
    const canvas = $(canvasId);
    if (!canvas) return null;
    if (state.charts[canvasId]) state.charts[canvasId].destroy();
    const ctx = canvas.getContext('2d');
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels:   state.history[key].labels,
            datasets: [{ data: state.history[key].data, borderColor: CHART_CFG[key].color, borderWidth: 1, pointRadius: 0, fill: false }]
        },
        options: { responsive: false, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function initCharts() {
    state.charts['chart-jarak']         = makeChart('chart-jarak', 'jarak', 70);
    state.charts['chart-jarak-manual']  = makeChart('chart-jarak-manual', 'jarak_manual', 70);
    state.charts['chart-jarak-big']     = makeChart('chart-jarak-big', 'jarak', 120);
    state.charts['chart-jarak-manual-big'] = makeChart('chart-jarak-manual-big', 'jarak_manual', 120);
}

function pushHistory(key, val) {
    const h = state.history[key];
    if (!h) return;
    h.labels.push(new Date().toLocaleTimeString('id-ID', { hour12: false }));
    h.data.push(parseFloat(val) || 0);
    if (h.labels.length > MAX_PTS) { h.labels.shift(); h.data.shift(); }

    [`chart-${key === 'jarak_manual' ? 'jarak-manual' : key}`,
     `chart-${key === 'jarak_manual' ? 'jarak-manual' : key}-big`].forEach(id => {
        const ch = state.charts[id];
        if (!ch) return;
        ch.data.labels           = h.labels;
        ch.data.datasets[0].data = h.data;
        ch.update('none');
    });
}

// =====================================================================
// INITIALIZATION ONLOAD
// =====================================================================
$('btn-connect-ble').onclick    = connectBLE;
$('btn-disconnect-ble').onclick = () => { if (state.device) state.device.gatt.disconnect(); };
$('btn-connect-fb').onclick     = connectFirebase;
$('btnClearLog').onclick        = () => $('terminalLog').innerHTML = '';

window.onload = () => {
    initCharts();
    applyMode(true);
    const saved = JSON.parse(localStorage.getItem('smarthome_cfg') || '{}');
    if (saved.apiKey) {
        $('fb-apiKey').value = saved.apiKey;
        $('fb-dbUrl').value  = saved.dbUrl;
        $('fb-path').value   = saved.path || "smarthome/ruangan1";
    }
    log("✓ System UI My Little Pusheen Siap Digunakan! 🌸 🌱", "#27c93f");
};
</script>
