<!-- =========================================================
     UI MY LITTLE PUSHEEN - DHT11 + RELAY ONLY
     LOGIC TETAP AMAN
========================================================= -->

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Little Pusheen</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Fredoka', sans-serif;

    background-image:url('https://i.pinimg.com/webp/1200x/b7/6d/5f/b76d5f2ffb21263b588c23618d97ee9a.webp');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    position:relative;
}

/* ===================================
   BLUR BACKGROUND
=================================== */

body::before{
    content:"";
    position:fixed;
    inset:0;

    backdrop-filter:blur(8px);
    background:rgba(255,255,255,0.1);

    z-index:0;
}

/* ===================================
   MAIN LAYOUT
=================================== */

.container{
    width:100%;
    max-width:1450px;
    margin:auto;
    padding:20px;

    position:relative;
    z-index:2;

    display:grid;
    grid-template-columns:1.3fr 0.4fr 0.7fr;
    gap:20px;
}

/* ===================================
   TITLE
=================================== */

.title-box{
    grid-column:1/3;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

.title-box img{
    width:720px;
    max-width:100%;
}

/* ===================================
   GENERAL CARD
=================================== */

.card{
    background:#f7f7f7;
    border-radius:24px;
    position:relative;
    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.08);
}

/* ===================================
   DHT11
=================================== */

.dht-card{
    height:275px;
    padding:30px 40px;
}

.card-title{
    font-size:22px;
    color:#c09ad8;
    font-weight:700;
}

.temp{
    margin-top:55px;

    font-size:90px;
    font-weight:700;

    color:#ff2d2d;

    letter-spacing:10px;
}

.temp-desc{
    margin-top:10px;

    color:#b5b5b5;
    font-size:28px;
    font-weight:600;
}

/* ===================================
   FIREBASE
=================================== */

.firebase-card{
    grid-column:1/2;

    height:585px;
    padding:35px 50px;
}

.firebase-title{
    font-size:45px;
    color:#d52c90;
    font-weight:700;

    margin-bottom:30px;
}

.firebase-card label{
    display:block;

    margin-top:22px;
    margin-bottom:10px;

    color:#c81f80;

    font-size:28px;
    font-weight:700;
}

.firebase-card input{
    width:100%;
    height:58px;

    border-radius:18px;
    border:4px solid #ff4ca8;

    background:white;

    padding:0 18px;

    font-size:18px;
    outline:none;
}

.firebase-btn{
    width:520px;
    max-width:100%;

    height:72px;

    border:none;
    border-radius:40px;

    margin-top:40px;

    background:#ff43a5;

    color:white;

    font-size:28px;
    font-weight:700;

    cursor:pointer;
}

/* ===================================
   MODE
=================================== */

.mode-card{
    height:585px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.mode-top{
    color:#ff7abd;
    font-size:50px;
    font-weight:700;
}

.mode-bottom{
    margin-top:18px;

    color:#e7d84f;
    font-size:44px;
    font-weight:700;
}

/* ===================================
   SWITCH
=================================== */

.switch{
    position:relative;
    display:inline-block;

    width:100px;
    height:180px;

    margin-top:20px;
}

.switch input{
    opacity:0;
}

.slider{
    position:absolute;
    inset:0;

    border-radius:60px;
    background:#efe9a4;
}

.slider::before{
    content:"";

    position:absolute;

    width:72px;
    height:72px;

    border-radius:50%;

    background:#f7b6d5;

    left:14px;
    top:14px;

    transition:0.4s;
}

.switch input:checked + .slider::before{
    transform:translateY(80px);
}

/* ===================================
   RELAY
=================================== */

.relay-card{
    height:585px;
    padding:30px;

    text-align:center;
}

.relay-title{
    margin-top:20px;

    font-size:58px;
    font-weight:700;

    color:#e56e41;
}

.relay-desc{
    margin-top:20px;

    color:#9d9d9d;
    font-size:26px;
    line-height:1.5;

    font-weight:600;
}

.relay-status{
    margin-top:30px;

    font-size:60px;
    font-weight:700;

    color:#999;
}

/* ===================================
   TERMINAL
=================================== */

.terminal{
    grid-column:2/4;

    height:380px;

    background:#6f0f49;

    border-radius:35px;

    overflow:hidden;

    position:relative;
}

.terminal-top{
    height:65px;

    display:flex;
    align-items:center;
    gap:20px;

    padding:0 25px;
}

.dots{
    display:flex;
    gap:12px;
}

.dot{
    width:18px;
    height:18px;

    border-radius:50%;
}

.red{background:#ff5f57;}
.yellow{background:#febc2e;}
.green{background:#28c840;}

.terminal-title{
    color:#ff62c8;
    font-size:22px;
}

.log-box{
    width:calc(100% - 50px);
    height:285px;

    background:black;

    margin:auto;

    border-radius:12px;

    overflow:auto;

    padding:20px;

    color:#7dff8a;

    font-family:monospace;
}

/* ===================================
   CHARTS
=================================== */

.chart-left{
    position:absolute;

    left:-30px;
    bottom:20px;

    width:180px;
}

.chart-bottom{
    position:absolute;

    right:20px;
    bottom:10px;

    width:180px;
}

.chart-temp{
    position:absolute;

    right:30px;
    top:85px;

    width:170px;
}

.chart-mode{
    position:absolute;

    bottom:40px;

    width:110px;
}

.chart-relay{
    width:100px;
    margin-top:10px;
}

/* ===================================
   DECORATION
=================================== */

.decor{
    position:fixed;
    z-index:1;
    pointer-events:none;
}

.left-decor{
    left:-20px;
    bottom:0;

    width:230px;
}

.right-decor{
    right:-10px;
    top:160px;

    width:180px;
}

.vector1{
    top:70px;
    left:210px;

    width:60px;
}

.vector2{
    top:100px;
    right:520px;

    width:80px;
}

.star{
    top:40px;
    right:550px;

    width:70px;
}

/* ===================================
   RESPONSIVE
=================================== */

@media(max-width:1200px){

    .container{
        grid-template-columns:1fr;
    }

    .title-box,
    .firebase-card,
    .terminal{
        grid-column:auto;
    }

    .firebase-card,
    .relay-card,
    .mode-card,
    .dht-card{
        height:auto;
    }

}

</style>
</head>

<body>

<!-- ===================================
     DECORATIONS
=================================== -->

<img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%204.png?raw=true" class="decor left-decor">

<img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%205.png?raw=true" class="decor right-decor">

<img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Vector%203.png?raw=true" class="decor vector1">

<img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Vector%206.png?raw=true" class="decor vector2">

<img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Star%202.png?raw=true" class="decor star">


<!-- ===================================
     CONTAINER
=================================== -->

<div class="container">

    <!-- TITLE -->
    <div class="title-box">

        <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2013.png?raw=true">

    </div>

    <!-- DHT11 -->
    <div class="card dht-card">

        <div class="card-title">
            🌡️ DHT11 - SUHU
        </div>

        <div class="temp" id="temperature">
            --°
        </div>

        <div class="temp-desc">
            Suhu udara taman
        </div>

        <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2018.png?raw=true" class="chart-temp">

    </div>

    <!-- FIREBASE -->
    <div class="card firebase-card">

        <div class="firebase-title">
            ☁️ Firebase Cloud Sync
        </div>

        <label>Api key</label>
        <input type="password" id="apiKey">

        <label>Database URL</label>
        <input type="text" id="dbURL">

        <label>Node path</label>
        <input type="text" id="nodePath">

        <button class="firebase-btn">
            🔗 Hubungkan Firebase
        </button>

        <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2014.png?raw=true" class="chart-left">

    </div>

    <!-- MODE -->
    <div class="card mode-card">

        <div class="mode-top">
            Auto
        </div>

        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>

        <div class="mode-bottom">
            Manual
        </div>

        <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2019%20(1).png?raw=true" class="chart-mode">

    </div>

    <!-- RELAY -->
    <div class="card relay-card">

        <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2020.png?raw=true" class="chart-relay">

        <div class="relay-title">
            Relay
        </div>

        <div class="relay-desc">
            📌 pin P13 · Untuk mengontrol
            nyala dan matinya kipas
        </div>

        <div class="relay-status" id="relayStatus">
            Off
        </div>

    </div>

    <!-- TERMINAL -->
    <div class="terminal">

        <div class="terminal-top">

            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>

            <div class="terminal-title">
                System_terminal
            </div>

        </div>

        <div class="log-box" id="terminalLog"></div>

        <img src="https://github.com/Navrad16/Latihan-Finpro/blob/main/Group%2021.png?raw=true" class="chart-bottom">

    </div>

</div>

</body>
</html>
