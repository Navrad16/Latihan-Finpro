        :root {
            --pink-primary: #f06292;
            --pink-bubblegum: #ff4081;
            --pink-border: #ff85af;
            --yellow-pastel: #fff59d;
            --yellow-border: #ffe082;
            --text-dark: #704254;
            --text-muted: #9e7788;
            --card-bg: rgba(255, 255, 255, 0.93);
            --radius-custom: 22px;
            --radius-input: 16px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Fredoka', 'Nunito', sans-serif;
            min-height: 100vh;
            /* Menggunakan gambar background dari Pinterest sesuai request */
            background: url('https://i.pinimg.com/webp/1200x/b7/6d/5f/b76d5f2ffb21263b588c23618d97ee9a.webp') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-dark);
            padding: 30px 16px 60px;
            position: relative;
            overflow-x: hidden;
        }

        .wrapper {
            max-width: 1150px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== LOGO / HEADER AREA ===== */
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            text-align: center;
        }
        
        /* Banner mockup My Little Pusheen Text */
        .pusheen-banner {
            background: linear-gradient(135deg, #e91e63, #ff4081);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: 1px;
            border: 5px solid white;
            box-shadow: 0 8px 0px rgba(233, 30, 99, 0.2);
            display: inline-block;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.15);
        }

        .header-subtitle {
            font-size: 1.1rem;
            font-weight: 600;
            color: #512da8;
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        /* ===== STATUS BADGES (top right) ===== */
        .status-wrap {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 8px; z-index: 1000;
        }
        .badge {
            background: white; backdrop-filter: blur(12px);
            padding: 8px 18px; border-radius: 30px;
            font-size: 12px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(221, 44, 0, 0.08);
            border: 2px solid #ffccd8;
            transition: all .3s; color: var(--text-muted);
        }
        .badge.online { color: #e91e63; border-color: var(--pink-border); background: #ffe4ec; }
